<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyApp To-Do</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 40px 20px; }
    .container { max-width: 600px; margin: auto; }
    h1 { color: #24292e; margin-bottom: 8px; }
    .subtitle { color: #586069; font-size: 14px; margin-bottom: 24px; }
    .add-form { display: flex; gap: 8px; margin-bottom: 24px; }
    .add-form input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5da;
                      border-radius: 6px; font-size: 15px; }
    .add-form button { padding: 10px 20px; background: #0969da; color: #fff;
                       border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    .add-form button:hover { background: #0860ca; }
    .task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 12px; background: #fff;
                 border: 1px solid #e1e4e8; border-radius: 6px; padding: 12px 16px;
                 margin-bottom: 8px; }
    .task-item.done span { text-decoration: line-through; color: #959da5; }
    .task-item span { flex: 1; font-size: 15px; }
    .btn-done { padding: 4px 12px; border-radius: 4px; border: 1px solid #28a745;
                background: #e6ffed; color: #28a745; cursor: pointer; font-size: 13px; }
    .btn-del  { padding: 4px 12px; border-radius: 4px; border: 1px solid #d73a49;
                background: #ffeef0; color: #d73a49; cursor: pointer; font-size: 13px; }
    .footer { margin-top: 32px; font-size: 12px; color: #959da5; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MyApp To-Do List</h1>
    <p class="subtitle">Deployed by Jenkins + Ansible to Kubernetes on DigitalOcean</p>
    <div class="add-form">
      <input id="newTask" type="text" placeholder="Add a new task..." />
      <button onclick="addTask()">Add Task</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="footer" id="footer"></div>
  </div>
  <script>
    async function loadTasks() {
      const res   = await fetch('/api/tasks');
      const tasks = await res.json();
      const list  = document.getElementById('taskList');
      list.innerHTML = '';
      tasks.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' done' : '');
        li.innerHTML = `
          <span>${t.text}</span>
          <button class="btn-done" onclick="toggle(${t.id})">${t.done ? 'Undo' : 'Done'}</button>
          <button class="btn-del"  onclick="del(${t.id})">Delete</button>
        `;
        list.appendChild(li);
      });
      document.getElementById('footer').textContent =
        tasks.length + ' task(s)  |  ' + tasks.filter(t=>t.done).length + ' completed';
    }
    async function addTask() {
      const input = document.getElementById('newTask');
      const text  = input.value.trim();
      if (!text) return;
      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      loadTasks();
    }
    async function toggle(id) {
      await fetch('/api/tasks/' + id, { method: 'PATCH' });
      loadTasks();
    }
    async function del(id) {
      await fetch('/api/tasks/' + id, { method: 'DELETE' });
      loadTasks();
    }
    document.getElementById('newTask').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    loadTasks();
  </script>
</body>
</html>
